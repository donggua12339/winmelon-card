# winmelon.cn - 临时 HTTP 配置（SSL 后续配）
limit_req_zone $binary_remote_addr zone=wmcard:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=wmcard_login:10m rate=1r/s;

upstream wm_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name winmelon.cn;

    root /www/wwwroot/winmelon.cn;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location ~ ^/api/payment/notify/ {
        limit_req zone=wmcard burst=10 nodelay;
        proxy_pass http://wm_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location ~ ^/api/(auth/login|shop/.*/orders) {
        limit_req zone=wmcard_login burst=5 nodelay;
        proxy_pass http://wm_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /api/ {
        limit_req zone=wmcard burst=20 nodelay;
        proxy_pass http://wm_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log /www/wwwlogs/winmelon.cn.log;
    error_log /www/wwwlogs/winmelon.cn.error.log;
}
