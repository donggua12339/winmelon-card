# ============================================================
# winmelon.cn - WM Card 站点配置（宝塔 Nginx）
# 放到 /www/server/panel/vhost/nginx/winmelon.cn.conf
# ============================================================

# 限流区
limit_req_zone $binary_remote_addr zone=wmcard:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=wmcard_login:10m rate=1r/s;

upstream wm_api {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ------------------------------------------------------------
# HTTP -> HTTPS + Let's Encrypt
# ------------------------------------------------------------
server {
    listen 80;
    server_name winmelon.cn;

    # Let's Encrypt 证书验证
    location /.well-known/acme-challenge/ {
        root /www/wwwroot/winmelon.cn;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ------------------------------------------------------------
# HTTPS 主站
# ------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name winmelon.cn;

    # TLS 证书（宝塔申请后自动填入路径）
    ssl_certificate     /www/server/panel/vhost/cert/winmelon.cn/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/winmelon.cn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    root /www/wwwroot/winmelon.cn;
    index index.html;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'" always;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # 健康检查
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # 支付回调（公开但限流）
    location ~ ^/api/payment/notify/ {
        limit_req zone=wmcard burst=10 nodelay;
        proxy_pass http://wm_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # 登录/下单接口单独限流
    location ~ ^/api/(auth/login|shop/.*/orders) {
        limit_req zone=wmcard_login burst=5 nodelay;
        proxy_pass http://wm_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # 其余 API
    location /api/ {
        limit_req zone=wmcard burst=20 nodelay;
        proxy_pass http://wm_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # 前端 SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 日志
    access_log /www/wwwlogs/winmelon.cn.log;
    error_log /www/wwwlogs/winmelon.cn.error.log;
}
