# M3: 3 实例 round-robin 负载均衡
# 用法：在服务器上把这个文件追加到 /www/server/panel/vhost/nginx/winmelon.cn.conf
# 或用 sed 替换现有 upstream wm_api 块

upstream wm_api {
    # M3: 3 实例 round-robin
    server 127.0.0.1:3001 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:3002 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:3003 max_fails=3 fail_timeout=30s;
    keepalive 32;
}
