name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend:
    name: API typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
      - run: npm run build
      - name: Test database connection
        run: |
          docker run -d --name pg-test -e POSTGRES_PASSWORD=test -e POSTGRES_USER=test -e POSTGRES_DB=test -p 5433:5432 postgres:15-alpine
          sleep 8
          DATABASE_URL="postgresql://test:test@localhost:5433/test" npx prisma migrate deploy || true
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

  frontend:
    name: Web typecheck + build + Playwright
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run build
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Run e2e tests (against live preview or mock)
        run: npx playwright test e2e/user-flow.spec.ts --reporter=list
        env:
          CI: 'true'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/e2e/screenshots/
          retention-days: 7
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results
          path: apps/web/test-results/
          retention-days: 7

  lint:
    name: Lint + typecheck (full stack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: API tsc
        run: npx tsc --noEmit
        working-directory: apps/api
      - name: Web tsc
        run: npx vue-tsc --noEmit
        working-directory: apps/web
