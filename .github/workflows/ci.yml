name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma Client
        run: npm --workspace @wm-card/api run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: |
          npm --workspace @wm-card/shared-types run typecheck
          npm --workspace @wm-card/api run typecheck
          npm --workspace @wm-card/web run typecheck

      - name: Build
        run: |
          npm --workspace @wm-card/shared-types run build
          npm --workspace @wm-card/api run build
          npm --workspace @wm-card/web run build

      - name: Test
        run: npm --workspace @wm-card/api run test -- --passWithNoTests

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Audit dependencies
        run: npm audit --audit-level=high --omit=dev || true
