# ============================================================
# WM Card 生产环境编排
# 单机部署：MySQL + Redis + API + Web(Nginx)
# 用法：cp .env.prod.example .env.prod && vim .env.prod
#       docker compose -f docker-compose.prod.yml up -d
# ============================================================
name: wm-card-prod

services:
  mysql:
    image: mysql:8.0
    container_name: wm-card-mysql-prod
    restart: always
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max-connections=200
      - --innodb-buffer-pool-size=256M
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wmcard}
      MYSQL_USER: ${MYSQL_USER:-wmcard}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./deploy/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./deploy/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-p${MYSQL_ROOT_PASSWORD}']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - wm-card-net
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: wm-card-redis-prod
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - wm-card-net
    logging:
      driver: json-file
      options:
        max-size: '5m'
        max-file: '3'
    deploy:
      resources:
        limits:
          memory: 192M

  api:
    build:
      context: .
      dockerfile: deploy/docker/api.Dockerfile
    container_name: wm-card-api-prod
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env.prod
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://${MYSQL_USER:-wmcard}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-wmcard}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    networks:
      - wm-card-net
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
    deploy:
      resources:
        limits:
          memory: 512M

  web:
    build:
      context: .
      dockerfile: deploy/docker/web.Dockerfile
    container_name: wm-card-web-prod
    restart: always
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/nginx/wm-card.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
      - ./deploy/nginx/certbot:/var/www/certbot:ro
      - web-logs:/var/log/nginx
    networks:
      - wm-card-net
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  web-logs:
    driver: local

networks:
  wm-card-net:
    driver: bridge
