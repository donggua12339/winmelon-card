# ============================================================
# 生产环境编排（仅 API + Web，DB 与 Redis 单独部署或同机）
# 用法：docker compose -f docker-compose.prod.yml up -d
# ============================================================
name: wm-card-prod

services:
  api:
    build:
      context: .
      dockerfile: deploy/docker/api.Dockerfile
    container_name: wm-card-api-prod
    restart: always
    env_file: .env.prod
    environment:
      NODE_ENV: production
      PORT: 3000
    networks:
      - wm-card-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  web:
    build:
      context: .
      dockerfile: deploy/docker/web.Dockerfile
    container_name: wm-card-web-prod
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/wm-card.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
    networks:
      - wm-card-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  wm-card-net:
    driver: bridge
