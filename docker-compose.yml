# ============================================================
# WM 官方虚拟卡密交易平台 - 本地开发编排
# 用法：cp .env.example .env && docker compose up -d
# ============================================================
name: wm-card

services:
  mysql:
    image: mysql:8.0
    container_name: wm-card-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-wmcard}
      MYSQL_USER: ${MYSQL_USER:-wmcard}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wmcardpass}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wm-card-net

  redis:
    image: redis:7-alpine
    container_name: wm-card-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass} --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wm-card-net

  api:
    build:
      context: .
      dockerfile: deploy/docker/api.Dockerfile
    container_name: wm-card-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      API_PREFIX: ${API_PREFIX:-api}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      DATABASE_URL: mysql://${MYSQL_USER:-wmcard}:${MYSQL_PASSWORD:-wmcardpass}@mysql:3306/${MYSQL_DATABASE:-wmcard}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      CARD_ENCRYPTION_KEY: ${CARD_ENCRYPTION_KEY}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      ORDER_EXPIRE_MS: ${ORDER_EXPIRE_MS:-600000}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "3000:3000"
    networks:
      - wm-card-net

  web:
    build:
      context: .
      dockerfile: deploy/docker/web.Dockerfile
    container_name: wm-card-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"
    networks:
      - wm-card-net

volumes:
  mysql-data:
  redis-data:

networks:
  wm-card-net:
    driver: bridge
